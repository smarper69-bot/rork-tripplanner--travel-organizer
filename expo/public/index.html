<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripNest – Plan Trips Together</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: light dark;
      --accent: #0891B2;
      --bg:     #f1f5f9;
      --surface:#ffffff;
      --text:   #0f172a;
      --text-2: #475569;
      --text-3: #94a3b8;
      --border: rgba(0,0,0,0.08);
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:    #0f172a;
        --surface:#1e293b;
        --text:  #f1f5f9;
        --text-2:#94a3b8;
        --text-3:#64748b;
        --border:rgba(255,255,255,0.07);
        --shadow:0 4px 24px rgba(0,0,0,0.4);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 48px 32px 40px;
      text-align: center;
    }

    .logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #0891B2, #06b6d4);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 8px 24px rgba(8,145,178,0.30);
    }

    h1 {
      font-size: 28px; font-weight: 800;
      letter-spacing: -0.5px; line-height: 1.1;
      color: var(--text); margin-bottom: 10px;
    }

    .tagline {
      font-size: 16px; color: var(--text-2);
      line-height: 1.5; margin-bottom: 36px;
    }

    .divider {
      width: 40px; height: 3px;
      background: linear-gradient(90deg, #0891B2, #06b6d4);
      border-radius: 2px; margin: 0 auto 32px;
    }

    .message {
      font-size: 14px; color: var(--text-3);
      line-height: 1.6; margin-bottom: 32px;
    }

    .store-row {
      display: flex; gap: 10px; justify-content: center;
    }
    .store-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 12px 20px;
      background: var(--text); color: var(--surface);
      border-radius: 12px; text-decoration: none;
      font-size: 13px; font-weight: 600;
      transition: opacity 0.14s;
      -webkit-tap-highlight-color: transparent;
    }
    .store-btn:active { opacity: 0.75; }

    footer {
      margin-top: 32px;
      font-size: 12px; color: var(--text-3);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <!-- Plane icon -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
           stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19 4c-2 0-1.5 1.5-3.5 2.5L3 8l8 2.2 1.7 1.7"/>
      </svg>
    </div>

    <h1>TripNest</h1>
    <p class="tagline">Plan trips together</p>
    <div class="divider"></div>
    <p class="message">Open the TripNest app on your phone to continue.<br>If you received a trip invite, open the link from your messages.</p>

    <div class="store-row">
      <a href="https://apps.apple.com/app/id0000000000" class="store-btn">
        <!-- Apple icon -->
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        App Store
      </a>
      <a href="https://play.google.com/store/apps/details?id=app.rork.tripplanner_travel_organizer_66zlm3j" class="store-btn">
        <!-- Play icon -->
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 20.5v-17c0-.83.94-1.3 1.6-.8l14 8.5c.6.36.6 1.24 0 1.6l-14 8.5c-.66.5-1.6.03-1.6-.8z"/>
        </svg>
        Play Store
      </a>
    </div>
  </div>

  <footer>© 2025 TripNest</footer>
</body>
</html>
